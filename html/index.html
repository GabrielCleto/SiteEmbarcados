<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Sistemas Embarcados - Portal</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #00979C;
            padding: 30px;
            text-align: center;
            color: white;
            font-size: 25px;
        }

        section {
            display: flex; /* Organiza Nav e Article lado a lado */
            flex: 1;
        }

        nav {
            width: 30%;
            background: #e6f4f4;
            padding: 20px;
            border-right: 1px solid #ccc;
        }

        nav h3 {
            margin-bottom: 15px;
            color: #006468;
        }

        nav ul {
            list-style-type: none;
        }

        nav ul li {
            margin-bottom: 10px;
        }

        /* Estilo dos botões */
        nav ul li a {
            display: block;
            background-color: rgb(6, 141, 96);
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        nav ul li a:hover {
            background-color: #00979C;
            transform: scale(1.02);
        }

        /* O "Canto Vazio" onde o site vai abrir */
        article {
            width: 70%;
            background-color: #f1f1f1;
            padding: 10px;
        }

        /* Ajuste do Iframe para ocupar todo o espaço do Article */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 5px;
            background-color: white; /* Cor de fundo enquanto carrega */
        }

        footer {
            background-color: #006468;
            padding: 15px;
            text-align: center;
            color: white;
        }

        /* Ajuste para celular */
        @media (max-width: 600px) {
            section { flex-direction: column; }
            nav, article { width: 100%; height: auto; }
            article { height: 450px; }
        }
    </style>
</head>
<body>

<header>
    <h2>Sistemas Embarcados</h2>
</header>

<section>
    <nav>
        <h3>Links</h3>
        <ul>
            <li><a href="https://www.arduino.cc/" target="janela_conteudo">Arduino UNO</a></li>
            <li><a href="https://victorvision.com.br/blog/placa-esp32/" target="janela_conteudo">Esp32</a></li>
            <li><a href="https://www.makerhero.com/categoria/raspberry-pi/" target="janela_conteudo">Raspberry Pi</a></li>
            <li><a href="https://pt.wikipedia.org/wiki/Sistema_embarcado" target="janela_conteudo">O que é? (Wiki)</a></li>
            <li><a href="https://wokwi.com/" target="janela_conteudo">Wokwi</a></li>
            <li><a href="https://calculadora.lol/calculadora-de-resistores/" target="janela_conteudo">Calcular Resistores </a></li>
            <li><a href="https://www.robocore.net/" target="janela_conteudo"> RoboCore</a></li>
        </ul>
    </nav>
    
    <article>
        <iframe name="janela_conteudo" src="about:blank"></iframe>
        <p style=" text-align: center;">Site De suporte Para Estudantes em Embarcados</p>
    </article>
</section>

<footer>
    <p>Gabriel Cleto - 2026</p>
</footer>

</body>
</html>
